<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会社管理 | 口座・経費・決算管理</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="config.js"></script>

<style>
  :root{
    --ink:#1C2B39;
    --bg:#F7F5F1;
    --card:#FFFFFF;
    --accent:#2F7A6B;
    --accent-soft:#E4EFEC;
    --positive:#3F8F5F;
    --positive-soft:#E7F3EC;
    --negative:#B4533D;
    --negative-soft:#F7EAE5;
    --warn:#B98A2E;
    --warn-soft:#F6EFDF;
    --muted:#7C8A93;
    --border:#E2DED4;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    margin:0 0 4px 0;
    letter-spacing:.01em;
  }
  .num{
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:11px 18px;
    font-size:14px;
    font-weight:600;
    transition:transform .08s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.98);}
  button:focus-visible, input:focus-visible, select:focus-visible{
    outline:3px solid var(--accent-soft);
    outline-offset:1px;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:.88;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{opacity:.88;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}
  .btn-ghost:hover{background:#fff;}
  .btn-approve{background:var(--positive);color:#fff;padding:7px 14px;font-size:13px;}
  .btn-reject{background:transparent;color:var(--negative);border:1px solid var(--negative);padding:7px 14px;font-size:13px;}
  input,select,textarea{
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  label{font-size:12.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;}

  .wave{width:100%;height:20px;display:block;opacity:.55;margin:28px 0;}

  /* --- ゲート画面 --- */
  .gate-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .gate-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px 32px;
    max-width:420px;
    width:100%;
    box-shadow:0 1px 2px rgba(28,43,57,.04);
  }
  .gate-eyebrow{
    font-size:12px;letter-spacing:.12em;color:var(--accent);font-weight:700;
    text-transform:uppercase;margin-bottom:10px;
  }
  .gate-title{font-size:24px;font-weight:700;margin-bottom:6px;}
  .gate-sub{font-size:13.5px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
  .role-buttons{display:flex;flex-direction:column;gap:10px;}
  .role-buttons button{padding:16px;font-size:15px;text-align:left;display:flex;justify-content:space-between;align-items:center;}
  .role-buttons button span.sub{display:block;font-weight:400;font-size:12px;margin-top:3px;opacity:.75;}

  .field-group{margin-bottom:16px;}
  .error-msg{color:var(--negative);font-size:13px;margin-top:10px;min-height:18px;}
  .back-link{font-size:13px;color:var(--muted);cursor:pointer;display:inline-block;margin-bottom:18px;}
  .back-link:hover{color:var(--ink);}

  /* --- ダッシュボード共通 --- */
  .topbar{
    background:var(--ink);color:#fff;
    padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:10px;
  }
  .topbar .brand{font-family:'Zen Kaku Gothic New';font-weight:700;font-size:16px;}
  .topbar .who{font-size:12.5px;opacity:.75;margin-top:2px;}
  .topbar button{background:rgba(255,255,255,.12);color:#fff;font-size:12.5px;padding:8px 14px;}
  .topbar button:hover{background:rgba(255,255,255,.22);}

  .container{max-width:1040px;margin:0 auto;padding:28px 20px 60px;}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:20px;
  }
  .card h2{font-size:16px;}
  .card .desc{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:180px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  td.num, th.num{text-align:right;}
  tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .badge-pending{background:var(--warn-soft);color:var(--warn);}
  .badge-approved{background:var(--positive-soft);color:var(--positive);}
  .badge-rejected{background:var(--negative-soft);color:var(--negative);}

  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat .label{font-size:12px;color:var(--muted);}
  .stat .value{font-size:22px;font-weight:600;font-family:'JetBrains Mono';}
  .stat .value.negative{color:var(--negative);}
  .stat .value.positive{color:var(--positive);}

  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tabs button{background:transparent;color:var(--muted);padding:9px 16px;border:1px solid transparent;font-size:13.5px;}
  .tabs button.active{background:var(--card);color:var(--ink);border-color:var(--border);}

  .form-inline{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:14px;}
  .form-inline > div{flex:1;min-width:140px;}
  .form-inline button{white-space:nowrap;}

  .empty{color:var(--muted);font-size:13px;padding:14px 0;}
  .muted{color:var(--muted);}
  .company-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
  .company-picker > button{padding:8px 14px;font-size:13px;background:#fff;border:1px solid var(--border);color:var(--ink);}
  .company-chip{
    display:flex;align-items:center;gap:2px;
    background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;
  }
  .company-chip.active{background:var(--ink);border-color:var(--ink);}
  .company-chip.active .chip-label{color:#fff;}
  .company-chip .chip-label{padding:8px 10px;font-size:13px;cursor:pointer;font-weight:600;color:var(--ink);white-space:nowrap;}
  .company-chip .chip-arrow, .company-chip .chip-delete{
    background:transparent;border:none;color:var(--muted);padding:8px 7px;font-size:12px;border-radius:0;
  }
  .company-chip.active .chip-arrow{color:rgba(255,255,255,.7);}
  .company-chip .chip-arrow:hover{color:var(--ink);}
  .company-chip.active .chip-arrow:hover{color:#fff;}
  .company-chip .chip-delete:hover{color:var(--negative);}
  .row-delete{background:transparent;border:none;color:var(--muted);font-size:12px;padding:4px 8px;}
  .row-delete:hover{color:var(--negative);}

  .loss-expiry-warn{color:var(--warn);font-weight:700;}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* =====================================================================
   Supabase 初期化
===================================================================== */
if(!window.SUPABASE_URL || window.SUPABASE_URL.includes("xxxx")){
  document.getElementById('app').innerHTML =
    '<div style="padding:40px;font-family:sans-serif;max-width:560px;margin:0 auto;">' +
    '<h2>config.js が未設定です</h2>' +
    '<p>config.example.js を config.js としてコピーし、SupabaseプロジェクトのURLとanon keyを設定してください。</p>' +
    '</div>';
  throw new Error("config.js not set");
}
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

/* =====================================================================
   グローバル状態
===================================================================== */
const state = {
  screen: 'loading',        // loading | gate | emp-pick | emp-pin | admin-pin | employee | admin
  companies: [],
  employees: [],
  selectedCompanyId: null,
  selectedEmployeeId: null,
  session: null,             // { role: 'employee'|'admin', employeeId }
  currentEmployee: null,     // 自分の社員情報(employeeログイン時)
  adminCompanyId: null,      // 管理者が見ている会社
  adminTab: 'accounts',
};

const app = document.getElementById('app');
const yen = n => (n===null||n===undefined) ? '—' : Number(n).toLocaleString('ja-JP') + '円';
const ym = d => { const dt=new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月`; };

function waveDivider(){
  return `<svg class="wave" viewBox="0 0 400 20" preserveAspectRatio="none">
    <path d="M0 10 Q 25 0, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10"
      fill="none" stroke="#2F7A6B" stroke-width="1.5"/>
  </svg>`;
}

/* =====================================================================
   認証（匿名サインイン）
===================================================================== */
async function ensureAnonSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) return session;
  const { data, error } = await sb.auth.signInAnonymously();
  if(error){
    console.error(error);
    alert("匿名サインインに失敗しました。Supabase の Authentication → Providers → Anonymous Sign-Ins が有効か確認してください。");
    throw error;
  }
  return data.session;
}

async function loadExistingAppSession(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return null;
  const { data, error } = await sb.from('app_sessions').select('*').eq('id', user.id).maybeSingle();
  if(error || !data) return null;
  return { role: data.role, employeeId: data.employee_id };
}

/* =====================================================================
   起動
===================================================================== */
async function boot(){
  await ensureAnonSession();
  const existing = await loadExistingAppSession();
  if(existing){
    state.session = existing;
    if(existing.role === 'admin'){
      await enterAdmin();
    } else {
      await enterEmployee(existing.employeeId);
    }
  } else {
    state.screen = 'gate';
    render();
  }
}

/* =====================================================================
   画面遷移: ゲート
===================================================================== */
function goGate(){ state.screen='gate'; render(); }

async function goEmployeePick(){
  const { data, error } = await sb.from('company_directory').select('*').order('display_order').order('name');
  state.companies = data || [];
  state.screen = 'emp-company';
  render();
}

async function selectCompanyForEmployee(companyId){
  state.selectedCompanyId = companyId;
  const { data } = await sb.from('employee_directory').select('*').eq('company_id', companyId).order('name');
  state.employees = data || [];
  state.screen = 'emp-name';
  render();
}

function selectEmployeeName(employeeId){
  state.selectedEmployeeId = employeeId;
  state.screen = 'emp-pin';
  render();
}

function goAdminPin(){ state.screen='admin-pin'; render(); }

/* =====================================================================
   PIN照合
===================================================================== */
async function submitEmployeePin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_employee_pin', { pin, target_employee_id: state.selectedEmployeeId });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterEmployee(state.selectedEmployeeId);
}

async function submitAdminPin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_admin_pin', { pin });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterAdmin();
}

async function logout(){
  await sb.auth.signOut();
  Object.assign(state, {
    screen:'gate', session:null, currentEmployee:null,
    selectedCompanyId:null, selectedEmployeeId:null, adminCompanyId:null
  });
  await ensureAnonSession();
  render();
}

/* =====================================================================
   社員ダッシュボード
===================================================================== */
async function enterEmployee(employeeId){
  const { data: emp } = await sb.from('employees').select('*').eq('id', employeeId).maybeSingle();
  // 上のクエリは admin 以外は RLS で弾かれる想定なので、employee_directory からも補完
  let empInfo = emp;
  if(!empInfo){
    const { data: dir } = await sb.from('employee_directory').select('*').eq('id', employeeId).maybeSingle();
    empInfo = dir;
  }
  state.currentEmployee = empInfo;
  state.session = { role:'employee', employeeId };
  state.screen = 'employee';
  render();
  loadEmployeeData();
}

async function loadEmployeeData(){
  const employeeId = state.session.employeeId;
  const { data: accounts } = await sb.from('trading_accounts').select('*').eq('employee_id', employeeId);
  state.myAccounts = accounts || [];

  state.myBalances = {};
  for(const acc of state.myAccounts){
    const { data: balances } = await sb.from('monthly_balances').select('*').eq('account_id', acc.id).order('year_month', {ascending:false});
    state.myBalances[acc.id] = balances || [];
  }

  const { data: expenses } = await sb.from('expenses').select('*').eq('employee_id', employeeId).order('created_at', {ascending:false});
  state.myExpenses = expenses || [];

  const { data: ledger } = await sb.from('incentive_ledger').select('*').eq('employee_id', employeeId).order('created_at', {ascending:false});
  state.myIncentiveLedger = ledger || [];

  const { data: settlements } = await sb.from('annual_settlements').select('*').eq('employee_id', employeeId).order('fiscal_year_end', {ascending:false});
  state.mySettlements = settlements || [];

  renderEmployeeDashboard();
}

function incentiveBalance(ledgerEntries){
  return (ledgerEntries||[]).filter(e=>e.status==='completed').reduce((s,e)=>s+Number(e.amount),0);
}
function incentivePendingWithdrawals(ledgerEntries){
  return (ledgerEntries||[]).filter(e=>e.status==='pending' && e.entry_type==='withdrawal').reduce((s,e)=>s+Math.abs(Number(e.amount)),0);
}
function incentiveAvailable(ledgerEntries){
  return incentiveBalance(ledgerEntries) - incentivePendingWithdrawals(ledgerEntries);
}

async function addBalance(accountId, yearMonthValue, amount){
  const { error } = await sb.from('monthly_balances').insert({
    account_id: accountId,
    year_month: yearMonthValue + '-01',
    balance: amount
  });
  if(error){ alert('登録に失敗しました: ' + error.message); return; }
  loadEmployeeData();
}

async function addExpense(date, amount, description){
  const { error } = await sb.from('expenses').insert({
    employee_id: state.session.employeeId,
    expense_date: date,
    amount: amount,
    description: description
  });
  if(error){ alert('申請に失敗しました: ' + error.message); return; }
  loadEmployeeData();
}

async function requestWithdrawal(amount, note){
  if(!amount || amount<=0){ alert('金額を入力してください'); return; }
  const available = incentiveAvailable(state.myIncentiveLedger);
  if(amount > available){ alert(`引き出し可能額(${yen(available)})を超えています`); return; }
  const { error } = await sb.from('incentive_ledger').insert({
    employee_id: state.session.employeeId,
    entry_type: 'withdrawal',
    amount: -Math.abs(amount),
    status: 'pending',
    note: note || null
  });
  if(error){ alert('申請に失敗しました: ' + error.message); return; }
  loadEmployeeData();
}

/* =====================================================================
   管理者ダッシュボード
===================================================================== */
async function enterAdmin(){
  state.session = { role:'admin' };
  state.screen = 'admin';
  await loadCompaniesForAdmin();
  if(state.companies.length){ state.adminCompanyId = state.companies[0].id; }
  render();
  loadAdminData();
}

async function loadCompaniesForAdmin(){
  const { data: companies } = await sb.from('companies').select('*').order('display_order').order('created_at');
  state.companies = companies || [];
}

async function loadAdminData(){
  if(!state.adminCompanyId){ renderAdminDashboard(); return; }
  const companyId = state.adminCompanyId;

  const { data: employees } = await sb.from('employees').select('*').eq('company_id', companyId).order('name');
  state.adminEmployees = employees || [];

  const { data: accounts } = await sb.from('trading_accounts').select('*').eq('company_id', companyId);
  state.adminAccounts = accounts || [];

  state.adminBalances = {};
  for(const acc of state.adminAccounts){
    const { data: balances } = await sb.from('monthly_balances').select('*').eq('account_id', acc.id).order('year_month', {ascending:false});
    state.adminBalances[acc.id] = balances || [];
  }

  const empIds = (employees||[]).map(e=>e.id);
  let expenses = [];
  if(empIds.length){
    const { data } = await sb.from('expenses').select('*').in('employee_id', empIds).order('created_at', {ascending:false});
    expenses = data || [];
  }
  state.adminExpenses = expenses;

  const { data: pl } = await sb.from('company_pl_summary').select('*').eq('company_id', companyId).order('fiscal_year_end', {ascending:false});
  state.adminPL = pl || [];

  const { data: loss } = await sb.from('loss_carryforward_vintages').select('*').eq('company_id', companyId).order('fiscal_year_end', {ascending:false});
  state.adminLoss = loss || [];

  state.adminCashflows = {};
  for(const acc of state.adminAccounts){
    const { data: cfs } = await sb.from('account_cashflows').select('*').eq('account_id', acc.id).order('flow_date', {ascending:false});
    state.adminCashflows[acc.id] = cfs || [];
  }

  let ledger = [];
  if(empIds.length){
    const { data } = await sb.from('incentive_ledger').select('*').in('employee_id', empIds).order('created_at', {ascending:false});
    ledger = data || [];
  }
  state.adminIncentiveLedger = ledger;

  let settlements = [];
  if(empIds.length){
    const { data } = await sb.from('annual_settlements').select('*').in('employee_id', empIds).order('fiscal_year_end', {ascending:false});
    settlements = data || [];
  }
  state.adminSettlements = settlements;

  renderAdminDashboard();
}

function employeeIncentiveLedger(employeeId){
  return (state.adminIncentiveLedger||[]).filter(e=>e.employee_id===employeeId);
}

function switchAdminCompany(id){
  state.adminCompanyId = id;
  loadAdminData();
}

function switchAdminTab(tab){
  state.adminTab = tab;
  renderAdminDashboard();
}

async function approveExpense(id, paidFrom){
  const expense = (state.adminExpenses||[]).find(e=>e.id===id);
  if(!expense) return;

  if(paidFrom === 'incentive'){
    const available = incentiveAvailable(employeeIncentiveLedger(expense.employee_id));
    if(Number(expense.amount) > available){
      alert(`インセンティブ残高(引き出し申請中を除く利用可能額: ${yen(available)})が経費金額に足りません`);
      return;
    }
  }

  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('expenses').update({
    status:'approved', paid_from: paidFrom, approved_by:user.id, approved_at:new Date().toISOString()
  }).eq('id', id);
  if(error){ alert('更新に失敗しました: '+error.message); return; }

  if(paidFrom === 'incentive'){
    await sb.from('incentive_ledger').insert({
      employee_id: expense.employee_id,
      entry_type: 'expense_payment',
      amount: -Math.abs(Number(expense.amount)),
      status: 'completed',
      related_expense_id: id,
      note: expense.description || null
    });
  }
  loadAdminData();
}
async function rejectExpense(id){
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('expenses').update({ status:'rejected', approved_by:user.id, approved_at:new Date().toISOString() }).eq('id', id);
  if(error){ alert('更新に失敗しました: '+error.message); return; }
  loadAdminData();
}

async function addEmployee(name, salary){
  const { error } = await sb.from('employees').insert({ company_id: state.adminCompanyId, name, monthly_salary: salary });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function addAccount(name, employeeId){
  const { error } = await sb.from('trading_accounts').insert({ company_id: state.adminCompanyId, account_name:name, employee_id: employeeId || null });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function addCompany(name){
  const nextOrder = state.companies.length
    ? Math.max(...state.companies.map(c=>c.display_order ?? 100)) + 1
    : 0;
  const { error } = await sb.from('companies').insert({ name, display_order: nextOrder });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  await loadCompaniesForAdmin();
  render();
}

async function moveCompany(id, direction){
  const list = state.companies;
  const idx = list.findIndex(c=>c.id===id);
  const swapIdx = idx + direction;
  if(idx===-1 || swapIdx<0 || swapIdx>=list.length) return;

  // 現在の並び順を 0,1,2... に正規化しつつ、対象の2件だけ入れ替える
  const orders = list.map((c,i)=>i);
  const tmp = orders[idx]; orders[idx] = orders[swapIdx]; orders[swapIdx] = tmp;

  for(let i=0;i<list.length;i++){
    await sb.from('companies').update({ display_order: orders[i] }).eq('id', list[i].id);
  }
  await loadCompaniesForAdmin();
  render();
  loadAdminData();
}

async function deleteCompany(id, name){
  if(!confirm(`「${name}」を削除します。所属する社員・口座・入出金・経費・決算情報もすべて削除され、元に戻せません。本当に削除しますか？`)) return;

  const typed = prompt(`最終確認です。本当に削除する場合は、会社名「${name}」をそのまま入力してください。`);
  if(typed !== name){
    alert('入力が一致しなかったため、削除を中止しました。');

/* ---------------------------------------------------------------------
   投資収益の計算（残高の増減 − 入出金）
--------------------------------------------------------------------- */
function accountProfitForPeriod(accountId, startDate, endDate){
  const balances = (state.adminBalances[accountId]||[]).slice().sort((a,b)=> a.year_month.localeCompare(b.year_month));
  const before = balances.filter(b=>b.year_month <= startDate);
  const within = balances.filter(b=>b.year_month > startDate && b.year_month <= endDate);
  const startBalance = before.length ? Number(before[before.length-1].balance) : 0;
  const endBalance = within.length ? Number(within[within.length-1].balance) : startBalance;

  const cashflows = (state.adminCashflows[accountId]||[]).filter(cf => cf.flow_date > startDate && cf.flow_date <= endDate);
  const netCashflow = cashflows.reduce((s,cf)=>s+Number(cf.amount), 0);

  return (endBalance - startBalance) - netCashflow;
}

function employeeInvestmentProfit(employeeId, startDate, endDate){
  const accounts = (state.adminAccounts||[]).filter(a=>a.employee_id===employeeId);
  return accounts.reduce((s,acc)=> s + accountProfitForPeriod(acc.id, startDate, endDate), 0);
}

/* ---------------------------------------------------------------------
   口座管理タブ用: 残高記録の間隔ごとに「その間の入出金」「投資収益」を算出
--------------------------------------------------------------------- */
function monthlySeriesForAccount(accountId){
  const balances = (state.adminBalances[accountId]||[]).slice().sort((a,b)=>a.year_month.localeCompare(b.year_month));
  const cashflows = (state.adminCashflows[accountId]||[]).slice().sort((a,b)=>a.flow_date.localeCompare(b.flow_date));
  const series = [];
  let prevBalance = null;
  let prevDate = null;
  balances.forEach(b => {
    const cfSum = cashflows
      .filter(cf => (!prevDate || cf.flow_date > prevDate) && cf.flow_date <= b.year_month)
      .reduce((s,cf)=>s+Number(cf.amount), 0);
    const profit = prevBalance===null ? null : (Number(b.balance) - prevBalance) - cfSum;
    series.push({ year_month: b.year_month, balance: Number(b.balance), cashflow: cfSum, profit });
    prevBalance = Number(b.balance);
    prevDate = b.year_month;
  });
  return series;
}

/* ---------------------------------------------------------------------
   年次精算の保存
--------------------------------------------------------------------- */
async function saveAnnualSettlement(fields){
  const { data:{ user } } = await sb.auth.getUser();

  const investmentProfit = fields.investmentProfit;
  const salaryCost = fields.salaryCost;
  const taxActive = fields.taxActive;
  const taxRate = fields.taxRate;
  const taxCost = (taxActive && investmentProfit > 0) ? investmentProfit * taxRate : 0;
  const distributable = investmentProfit - salaryCost - taxCost;
  const splitRate = fields.splitRate;
  const employeeAmount = distributable >= 0 ? distributable * splitRate : distributable;
  const companyShare = distributable >= 0 ? (distributable - employeeAmount) : 0;

  const { data: settlement, error } = await sb.from('annual_settlements').upsert({
    employee_id: fields.employeeId,
    company_id: state.adminCompanyId,
    fiscal_year_start: fields.start,
    fiscal_year_end: fields.end,
    investment_profit: investmentProfit,
    salary_cost: salaryCost,
    company_tax_active: taxActive,
    tax_rate_used: taxActive ? taxRate : 0,
    tax_cost: taxCost,
    distributable,
    split_rate: splitRate,
    employee_settlement_amount: employeeAmount,
    company_share: companyShare,
    created_by: user.id
  }, { onConflict: 'employee_id,fiscal_year_end' }).select().single();

  if(error){ alert('精算の保存に失敗しました: '+error.message); return; }

  await sb.from('incentive_ledger').insert({
    employee_id: fields.employeeId,
    entry_type: 'annual_settlement',
    amount: employeeAmount,
    status: 'completed',
    related_settlement_id: settlement.id,
    note: `${fields.start} 〜 ${fields.end} の年次精算`
  });

  loadAdminData();
}

function drawAccountCharts(){
  if(!window.Chart) return;
  const series = monthlySeriesForAccount(state.selectedChartAccountId);
  const labels = series.map(s=>ym(s.year_month));

  state.charts = state.charts || {};
  if(state.charts.balance){ state.charts.balance.destroy(); state.charts.balance = null; }
  if(state.charts.profit){ state.charts.profit.destroy(); state.charts.profit = null; }

  const balanceCanvas = document.getElementById('balance-chart');
  if(balanceCanvas){
    state.charts.balance = new Chart(balanceCanvas, {
      data: {
        labels,
        datasets: [
          {
            type:'bar', label:'入出金', data: series.map(s=>s.cashflow),
            backgroundColor: series.map(s=> s.cashflow<0 ? 'rgba(180,83,61,0.55)' : 'rgba(63,143,95,0.55)'),
            yAxisID:'y1', order:2
          },
          {
            type:'line', label:'残高', data: series.map(s=>s.balance),
            borderColor:'#1C2B39', backgroundColor:'#1C2B39', pointRadius:3, tension:0.25,
            yAxisID:'y', order:1
          }
        ]
      },
      options: {
        responsive:true,
        interaction:{ mode:'index', intersect:false },
        scales: {
          y: { position:'left', ticks:{ callback:v=>Number(v).toLocaleString('ja-JP') } },
          y1:{ position:'right', grid:{ drawOnChartArea:false }, ticks:{ callback:v=>Number(v).toLocaleString('ja-JP') } }
        },
        plugins: { legend:{ position:'bottom' } }
      }
    });
  }

  const profitCanvas = document.getElementById('profit-chart');
  if(profitCanvas){
    state.charts.profit = new Chart(profitCanvas, {
      type:'bar',
      data: {
        labels,
        datasets: [{
          label:'月次投資収益',
          data: series.map(s=>s.profit),
          backgroundColor: series.map(s => (s.profit||0) < 0 ? '#B4533D' : '#2F7A6B')
        }]
      },
      options: {
        responsive:true,
        scales: { y:{ ticks:{ callback:v=>Number(v).toLocaleString('ja-JP') } } },
        plugins:{ legend:{ display:false } }
      }
    });
  }
}

function adminSettlementHtml(){
  if(!state.settlementForm){
    const now = new Date();
    state.settlementForm = {
      start: `${now.getFullYear()-1}-01-01`,
      end: `${now.getFullYear()}-01-01`,
      taxActive: false,
      taxRate: 0.30,
      splitRate: 0.5,
    };
  }
  const f = state.settlementForm;

  const remainingLoss = (state.adminLoss||[]).reduce((s,l)=>s+Number(l.remaining_amount||0),0);

  const rows = (state.adminEmployees||[]).map(emp => {
    const profit = employeeInvestmentProfit(emp.id, f.start, f.end);
    const annualSalary = Number(emp.monthly_salary) * 12;
    const taxCost = (f.taxActive && profit > 0) ? profit * f.taxRate : 0;
    const distributable = profit - annualSalary - taxCost;
    const employeeAmount = distributable >= 0 ? distributable * f.splitRate : distributable;
    const companyShare = distributable >= 0 ? distributable - employeeAmount : 0;
    const already = (state.adminSettlements||[]).find(s=>s.employee_id===emp.id && s.fiscal_year_end===f.end);

    return `
    <div class="card">
      <h3 style="margin-bottom:14px;">${emp.name}${already?' <span class="badge badge-approved">記録済み</span>':''}</h3>
      <div class="row">
        <div class="stat"><div class="label">投資収益(入出金調整後)</div><div class="value ${profit<0?'negative':'positive'}">${yen(profit)}</div></div>
        <div class="stat"><div class="label">固定給(年間)</div><div class="value">${yen(annualSalary)}</div></div>
        <div class="stat"><div class="label">法人税相当額</div><div class="value">${yen(taxCost)}</div></div>
      </div>
      <div class="row" style="margin-top:14px;">
        <div class="stat"><div class="label">分配対象額</div><div class="value ${distributable<0?'negative':'positive'}">${yen(distributable)}</div></div>
        <div class="stat"><div class="label">社員取り分(インセンティブへ)</div><div class="value ${employeeAmount<0?'negative':'positive'}">${yen(employeeAmount)}</div></div>
        <div class="stat"><div class="label">会社取り分</div><div class="value">${yen(companyShare)}</div></div>
      </div>
      <div style="margin-top:16px;">
        <button class="btn-accent" ${already?'disabled':''} onclick="saveAnnualSettlement({
          employeeId:'${emp.id}', start:'${f.start}', end:'${f.end}',
          investmentProfit:${profit}, salaryCost:${annualSalary},
          taxActive:${f.taxActive}, taxRate:${f.taxRate}, splitRate:${f.splitRate}
        })">${already?'この期間は記録済みです':'この内容で確定してインセンティブに反映'}</button>
      </div>
    </div>`;
  }).join('') || `<div class="card"><p class="empty">社員が登録されていません</p></div>`;

  return `
  <div class="card">
    <h2>年次精算の条件設定</h2>
    <div class="desc">現在のこの会社の繰越欠損金残高合計: <strong>${yen(remainingLoss)}</strong>${remainingLoss<=0?' — 使い切っているため通常は法人税が発生します':' — 残っているため通常は法人税は発生しません'}</div>
    <div class="row">
      <div><label>対象期間・開始</label><input type="date" value="${f.start}" onchange="state.settlementForm.start=this.value; renderAdminTabContent();" /></div>
      <div><label>対象期間・終了</label><input type="date" value="${f.end}" onchange="state.settlementForm.end=this.value; renderAdminTabContent();" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div>
        <label>この期間、会社は法人税が発生する</label>
        <select onchange="state.settlementForm.taxActive=(this.value==='yes'); renderAdminTabContent();">
          <option value="no" ${!f.taxActive?'selected':''}>いいえ(繰越欠損金でまだ相殺できる)</option>
          <option value="yes" ${f.taxActive?'selected':''}>はい(繰越欠損金を使い切った)</option>
        </select>
      </div>
      <div><label>法人税率</label><input type="number" step="0.01" value="${f.taxRate}" onchange="state.settlementForm.taxRate=Number(this.value); renderAdminTabContent();" /></div>
      <div><label>分配比率(社員側)</label><input type="number" step="0.05" value="${f.splitRate}" onchange="state.settlementForm.splitRate=Number(this.value); renderAdminTabContent();" /></div>
    </div>
  </div>
  ${rows}`;
}

      <div class="row" style="margin-top:10px;">
        <div><label>税引前利益</label><input type="number" id="pl-pretax" /></div>
        <div><label>法人税等(実績)</label><input type="number" id="pl-tax" /></div>
        <div><label>当期純利益(実績)</label><input type="number" id="pl-net" /></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div><label>想定実効税率(欠損金を使い切った後)</label><input type="number" step="0.01" id="pl-rate" value="0.30" /></div>
        <div><label>メモ</label><input type="text" id="pl-notes" placeholder="例: 決算報告書PDFより転記" /></div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-accent" onclick="submitPLForm()">保存</button>
      </div>
    </div>
  `;
}

function submitPLForm(){
  addPL({
    start: document.getElementById('pl-start').value,
    end: document.getElementById('pl-end').value,
    revenue: Number(document.getElementById('pl-revenue').value)||null,
    sga: Number(document.getElementById('pl-sga').value)||null,
    op: Number(document.getElementById('pl-op').value)||null,
    pretax: Number(document.getElementById('pl-pretax').value)||null,
    tax: Number(document.getElementById('pl-tax').value)||null,
    net: Number(document.getElementById('pl-net').value)||null,
    rate: Number(document.getElementById('pl-rate').value)||0.30,
    notes: document.getElementById('pl-notes').value,
  });
}

function adminLossHtml(){
  const today = new Date();
  const rows = (state.adminLoss||[]).map(l => {
    const expiry = l.expiry_fiscal_year_end ? new Date(l.expiry_fiscal_year_end) : null;
    const soon = expiry && ((expiry - today) / (1000*60*60*24*365) < 2);
    return `<tr>
      <td>${l.fiscal_year_start} 〜 ${l.fiscal_year_end}</td>
      <td class="num">${yen(l.incurred_amount)}</td>
      <td class="num">${yen(l.used_amount)}</td>
      <td class="num"><strong>${yen(l.remaining_amount)}</strong></td>
      <td class="${soon?'loss-expiry-warn':''}">${l.expiry_fiscal_year_end || '—'}${soon?' ⚠︎期限間近':''}</td>
      <td class="muted">${l.source_document||''}</td>
      <td><button class="row-delete" onclick="deleteLoss('${l.id}')">削除</button></td>
    </tr>`;
  }).join('') || `<tr><td colspan="7" class="empty">繰越欠損金データはまだ登録されていません</td></tr>`;

  const total = (state.adminLoss||[]).reduce((s,l)=>s+Number(l.remaining_amount||0),0);

  return `
  <div class="card">
    <div class="stat"><div class="label">現在の繰越欠損金残高合計</div><div class="value" style="font-size:28px">${yen(total)}</div></div>
  </div>
  <div class="card">
    <h2>発生年度別の内訳</h2>
    <table>
      <thead><tr><th>発生事業年度</th><th class="num">発生額</th><th class="num">控除済み累計</th><th class="num">繰越残額</th><th>失効期限</th><th>出典</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="card">
    <h2>欠損金データを追加</h2>
    <div class="desc">決算書(別表七)の内容を年度ごとに転記してください。失効期限の目安は発生事業年度の期末+10年です。</div>
    <div class="row">
      <div><label>発生事業年度・期首</label><input type="date" id="loss-start" /></div>
      <div><label>発生事業年度・期末</label><input type="date" id="loss-end" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>発生額</label><input type="number" id="loss-incurred" /></div>
      <div><label>控除済み累計</label><input type="number" id="loss-used" value="0" /></div>
      <div><label>繰越残額</label><input type="number" id="loss-remaining" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>失効期限</label><input type="date" id="loss-expiry" /></div>
      <div><label>出典メモ</label><input type="text" id="loss-doc" placeholder="例: 第12期 別表七(一)" /></div>
    </div>
    <div style="margin-top:14px;">
      <button class="btn-accent" onclick="submitLossForm()">保存</button>
    </div>
  </div>`;
}

function submitLossForm(){
  addLoss({
    start: document.getElementById('loss-start').value,
    end: document.getElementById('loss-end').value,
    incurred: Number(document.getElementById('loss-incurred').value)||0,
    used: Number(document.getElementById('loss-used').value)||0,
    remaining: Number(document.getElementById('loss-remaining').value)||0,
    expiry: document.getElementById('loss-expiry').value || null,
    doc: document.getElementById('loss-doc').value,
  });
}

/* =====================================================================
   起動
===================================================================== */
boot();
</script>
</body>
</html>
