<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>会社管理 | 口座・経費・決算管理</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="config.js"></script>

<style>
  :root{
    --ink:#1C2B39;
    --bg:#F7F5F1;
    --card:#FFFFFF;
    --accent:#2F7A6B;
    --accent-soft:#E4EFEC;
    --positive:#3F8F5F;
    --positive-soft:#E7F3EC;
    --negative:#B4533D;
    --negative-soft:#F7EAE5;
    --warn:#B98A2E;
    --warn-soft:#F6EFDF;
    --muted:#7C8A93;
    --border:#E2DED4;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    margin:0 0 4px 0;
    letter-spacing:.01em;
  }
  .num{
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:11px 18px;
    font-size:14px;
    font-weight:600;
    transition:transform .08s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.98);}
  button:focus-visible, input:focus-visible, select:focus-visible{
    outline:3px solid var(--accent-soft);
    outline-offset:1px;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:.88;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{opacity:.88;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}
  .btn-ghost:hover{background:#fff;}
  .btn-approve{background:var(--positive);color:#fff;padding:7px 14px;font-size:13px;}
  .btn-reject{background:transparent;color:var(--negative);border:1px solid var(--negative);padding:7px 14px;font-size:13px;}
  input,select,textarea{
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  label{font-size:12.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;}

  .wave{width:100%;height:20px;display:block;opacity:.55;margin:28px 0;}

  /* --- ゲート画面 --- */
  .gate-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .gate-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px 32px;
    max-width:420px;
    width:100%;
    box-shadow:0 1px 2px rgba(28,43,57,.04);
  }
  .gate-eyebrow{
    font-size:12px;letter-spacing:.12em;color:var(--accent);font-weight:700;
    text-transform:uppercase;margin-bottom:10px;
  }
  .gate-title{font-size:24px;font-weight:700;margin-bottom:6px;}
  .gate-sub{font-size:13.5px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
  .role-buttons{display:flex;flex-direction:column;gap:10px;}
  .role-buttons button{padding:16px;font-size:15px;text-align:left;display:flex;justify-content:space-between;align-items:center;}
  .role-buttons button span.sub{display:block;font-weight:400;font-size:12px;margin-top:3px;opacity:.75;}

  .field-group{margin-bottom:16px;}
  .error-msg{color:var(--negative);font-size:13px;margin-top:10px;min-height:18px;}
  .back-link{font-size:13px;color:var(--muted);cursor:pointer;display:inline-block;margin-bottom:18px;}
  .back-link:hover{color:var(--ink);}

  /* --- ダッシュボード共通 --- */
  .topbar{
    background:var(--ink);color:#fff;
    padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:10px;
  }
  .topbar .brand{font-family:'Zen Kaku Gothic New';font-weight:700;font-size:16px;}
  .topbar .who{font-size:12.5px;opacity:.75;margin-top:2px;}
  .topbar button{background:rgba(255,255,255,.12);color:#fff;font-size:12.5px;padding:8px 14px;}
  .topbar button:hover{background:rgba(255,255,255,.22);}

  .container{max-width:1040px;margin:0 auto;padding:28px 20px 60px;}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:20px;
  }
  .card h2{font-size:16px;}
  .card .desc{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:180px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  td.num, th.num{text-align:right;}
  tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .badge-pending{background:var(--warn-soft);color:var(--warn);}
  .badge-approved{background:var(--positive-soft);color:var(--positive);}
  .badge-rejected{background:var(--negative-soft);color:var(--negative);}

  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat .label{font-size:12px;color:var(--muted);}
  .stat .value{font-size:22px;font-weight:600;font-family:'JetBrains Mono';}
  .stat .value.negative{color:var(--negative);}
  .stat .value.positive{color:var(--positive);}

  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tabs button{background:transparent;color:var(--muted);padding:9px 16px;border:1px solid transparent;font-size:13.5px;}
  .tabs button.active{background:var(--card);color:var(--ink);border-color:var(--border);}

  .form-inline{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:14px;}
  .form-inline > div{flex:1;min-width:140px;}
  .form-inline button{white-space:nowrap;}

  .empty{color:var(--muted);font-size:13px;padding:14px 0;}
  .muted{color:var(--muted);}
  .company-picker{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .company-picker > button{padding:8px 14px;font-size:13px;background:#fff;border:1px solid var(--border);color:var(--ink);}
  .company-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
  .company-select{
    flex:1;max-width:340px;
    font-weight:600;font-size:14.5px;
    padding:11px 12px;
  }
  .company-gear{padding:10px 13px;font-size:15px;line-height:1;}
  .company-chip{
    display:flex;align-items:center;gap:2px;
    background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;
  }
  .company-chip.active{background:var(--ink);border-color:var(--ink);}
  .company-chip.active .chip-label{color:#fff;}
  .company-chip .chip-label{padding:8px 10px;font-size:13px;cursor:pointer;font-weight:600;color:var(--ink);white-space:nowrap;}
  .company-chip .chip-arrow, .company-chip .chip-delete{
    background:transparent;border:none;color:var(--muted);padding:8px 7px;font-size:12px;border-radius:0;
  }
  .company-chip.active .chip-arrow{color:rgba(255,255,255,.7);}
  .company-chip .chip-arrow:hover{color:var(--ink);}
  .company-chip.active .chip-arrow:hover{color:#fff;}
  .company-chip .chip-delete:hover{color:var(--negative);}
  .row-delete{background:transparent;border:none;color:var(--muted);font-size:12px;padding:4px 8px;}
  .row-delete:hover{color:var(--negative);}

  .loss-expiry-warn{color:var(--warn);font-weight:700;}

  /* --- 口座管理タブ: コンパクトなツールバーとチャート --- */
  .chart-toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
  .chart-account-select{flex:1;max-width:300px;font-weight:600;}
  .period-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0;}
  .period-toggle button{
    background:#fff;color:var(--muted);border:none;border-radius:0;
    padding:9px 16px;font-size:13px;
  }
  .period-toggle button.active{background:var(--ink);color:#fff;}
  .chart-card h3{font-size:14.5px;margin-bottom:12px;}
  .chart-sub{font-weight:400;font-size:12px;color:var(--muted);margin-left:6px;}
  .chart-box{position:relative;height:300px;}

  /* --- テーブルはカード内で横スクロール可能に --- */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* --- モバイル最適化 (iPhone等) --- */
  @media (max-width: 640px){
    .container{padding:16px 12px 48px;}
    .card{padding:16px 14px;margin-bottom:14px;border-radius:10px;}
    .topbar{padding:12px 14px;}
    .topbar .brand{font-size:14.5px;}
    .topbar button{padding:7px 10px;font-size:11.5px;}

    /* タブは折り返さず横スクロール */
    .tabs{
      flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
      margin-bottom:14px;padding-bottom:4px;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{display:none;}
    .tabs button{white-space:nowrap;padding:8px 13px;font-size:13px;flex-shrink:0;}

    .company-select{max-width:none;}

    /* テーブルを小さく詰めて、カード内で横スクロール */
    .card{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{font-size:12px;min-width:100%;}
    th,td{padding:7px 6px;white-space:nowrap;}

    .stat .value{font-size:18px;}
    .row{gap:10px;}
    .row > *{min-width:140px;}

    .form-inline{gap:8px;}
    .form-inline > div{min-width:100%;}
    .form-inline button{width:100%;}

    button{padding:10px 14px;}
    .btn-approve,.btn-reject{padding:6px 10px;font-size:12px;}
    .row-delete{font-size:11.5px;padding:3px 6px;}

    .gate-card{padding:28px 20px;}
    .wave{margin:18px 0;}

    /* 口座管理タブ */
    .chart-account-select{max-width:none;}
    .period-toggle button{padding:8px 13px;font-size:12.5px;}
    .chart-box{height:230px;}
    .chart-card{padding:14px 10px;}
    .chart-card h3{font-size:13.5px;margin-bottom:8px;padding-left:4px;}
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
/* =====================================================================
   Supabase 初期化
===================================================================== */
if(!window.SUPABASE_URL || window.SUPABASE_URL.includes("xxxx")){
  document.getElementById('app').innerHTML =
    '<div style="padding:40px;font-family:sans-serif;max-width:560px;margin:0 auto;">' +
    '<h2>config.js が未設定です</h2>' +
    '<p>config.example.js を config.js としてコピーし、SupabaseプロジェクトのURLとanon keyを設定してください。</p>' +
    '</div>';
  throw new Error("config.js not set");
}
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

/* =====================================================================
   グローバル状態
===================================================================== */
const state = {
  screen: 'loading',        // loading | gate | emp-pick | emp-pin | admin-pin | employee | admin
  companies: [],
  employees: [],
  selectedCompanyId: null,
  selectedEmployeeId: null,
  session: null,             // { role: 'employee'|'admin', employeeId }
  currentEmployee: null,     // 自分の社員情報(employeeログイン時)
  adminCompanyId: null,      // 管理者が見ている会社
  adminTab: 'accounts',
};

const app = document.getElementById('app');
const yen = n => (n===null||n===undefined) ? '—' : Number(n).toLocaleString('ja-JP') + '円';
const ym = d => { const dt=new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月`; };

function waveDivider(){
  return `<svg class="wave" viewBox="0 0 400 20" preserveAspectRatio="none">
    <path d="M0 10 Q 25 0, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10"
      fill="none" stroke="#2F7A6B" stroke-width="1.5"/>
  </svg>`;
}

/* =====================================================================
   認証（匿名サインイン）
===================================================================== */
async function ensureAnonSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) return session;
  const { data, error } = await sb.auth.signInAnonymously();
  if(error){
    console.error(error);
    alert("匿名サインインに失敗しました。Supabase の Authentication → Providers → Anonymous Sign-Ins が有効か確認してください。");
    throw error;
  }
  return data.session;
}

async function loadExistingAppSession(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return null;
  const { data, error } = await sb.from('app_sessions').select('*').eq('id', user.id).maybeSingle();
  if(error || !data) return null;
  return { role: data.role, employeeId: data.employee_id };
}

/* =====================================================================
   起動
===================================================================== */
async function boot(){
  await ensureAnonSession();
  const existing = await loadExistingAppSession();
  if(existing){
    state.session = existing;
    if(existing.role === 'admin'){
      await enterAdmin();
    } else {
      await enterEmployee(existing.employeeId);
    }
  } else {
    state.screen = 'gate';
    render();
  }
}

/* =====================================================================
   画面遷移: ゲート
===================================================================== */
function goGate(){ state.screen='gate'; render(); }

async function goEmployeePick(){
  const { data, error } = await sb.from('company_directory').select('*').order('display_order').order('name');
  state.companies = data || [];
  state.screen = 'emp-company';
  render();
}

async function selectCompanyForEmployee(companyId){
  state.selectedCompanyId = companyId;
  const { data } = await sb.from('employee_directory').select('*').eq('company_id', companyId).order('name');
  state.employees = data || [];
  state.screen = 'emp-name';
  render();
}

function selectEmployeeName(employeeId){
  state.selectedEmployeeId = employeeId;
  state.screen = 'emp-pin';
  render();
}

function goAdminPin(){ state.screen='admin-pin'; render(); }

/* =====================================================================
   PIN照合
===================================================================== */
async function submitEmployeePin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_employee_pin', { pin, target_employee_id: state.selectedEmployeeId });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterEmployee(state.selectedEmployeeId);
}

async function submitAdminPin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_admin_pin', { pin });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterAdmin();
}

async function logout(){
  await sb.auth.signOut();
  Object.assign(state, {
    screen:'gate', session:null, currentEmployee:null,
    selectedCompanyId:null, selectedEmployeeId:null, adminCompanyId:null
  });
  await ensureAnonSession();
  render();
}

/* =====================================================================
   社員ダッシュボード
===================================================================== */
async function enterEmployee(employeeId){
  const { data: emp } = await sb.from('employees').select('*').eq('id', employeeId).maybeSingle();
  // 上のクエリは admin 以外は RLS で弾かれる想定なので、employee_directory からも補完
  let empInfo = emp;
  if(!empInfo){
    const { data: dir } = await sb.from('employee_directory').select('*').eq('id', employeeId).maybeSingle();
    empInfo = dir;
  }
  state.currentEmployee = empInfo;
  state.session = { role:'employee', employeeId };
  state.screen = 'employee';
  render();
  loadEmployeeData();
}

async function loadEmployeeData(){
  const employeeId = state.session.employeeId;
  const { data: accounts } = await sb.from('trading_accounts').select('*').eq('employee_id', employeeId);
  state.myAccounts = accounts || [];

  state.myBalances = {};
  state.myCashflows = {};
  for(const acc of state.myAccounts){
    const { data: balances } = await sb.from('monthly_balances').select('*').eq('account_id', acc.id).order('year_month', {ascending:false});
    state.myBalances[acc.id] = balances || [];
    const { data: cfs } = await sb.from('account_cashflows').select('*').eq('account_id', acc.id).order('flow_date', {ascending:false});
    state.myCashflows[acc.id] = cfs || [];
  }

  const { data: annualExp } = await sb.from('annual_expenses').select('*').eq('employee_id', employeeId).order('fiscal_year_end', {ascending:false});
  state.myAnnualExpenses = annualExp || [];

  // 自分の会社の決算期(チャートの年次集計用)
  if(state.currentEmployee?.company_id){
    const { data: myCompany } = await sb.from('companies').select('*').eq('id', state.currentEmployee.company_id).maybeSingle();
    state.myCompanyFiscalMonth = myCompany?.fiscal_year_start_month || 4;
  } else {
    state.myCompanyFiscalMonth = 4;
  }

  const { data: ledger } = await sb.from('incentive_ledger').select('*').eq('employee_id', employeeId).order('created_at', {ascending:false});
  state.myIncentiveLedger = ledger || [];

  const { data: settlements } = await sb.from('annual_settlements').select('*').eq('employee_id', employeeId).order('fiscal_year_end', {ascending:false});
  state.mySettlements = settlements || [];

  const { data: salary } = await sb.rpc('get_my_salary');
  state.mySalary = salary ?? 0;

  renderEmployeeDashboard();
}

function incentiveBalance(ledgerEntries){
  return (ledgerEntries||[]).filter(e=>e.status==='completed').reduce((s,e)=>s+Number(e.amount),0);
}
function incentivePendingWithdrawals(ledgerEntries){
  return (ledgerEntries||[]).filter(e=>e.status==='pending' && e.entry_type==='withdrawal').reduce((s,e)=>s+Math.abs(Number(e.amount)),0);
}
function incentiveAvailable(ledgerEntries){
  return incentiveBalance(ledgerEntries) - incentivePendingWithdrawals(ledgerEntries);
}

/* ---------------------------------------------------------------------
   見込みインセンティブの自動計算(汎用)
   - 対象期間: 最後に確定した年次精算の期末翌日 〜 現在
     (確定精算がなければ、最初の残高記録の月から)
   - 給与コスト: 期間の経過月数 × 月給
   - 税は未確定要素のため見込みには含めない(注記で伝える)
   - DBには保存せず、常に最新の残高・入出金から算出するため、
     残高の修正・削除にも自動で追従する
--------------------------------------------------------------------- */
function estimateCurrentSettlement(accounts, balancesByAccount, cashflowsByAccount, monthlySalary, settlements, splitRate){
  splitRate = splitRate ?? 0.5;
  const settled = (settlements||[]).slice().sort((a,b)=>b.fiscal_year_end.localeCompare(a.fiscal_year_end));
  const periodStart = settled.length ? settled[0].fiscal_year_end : null; // この日「まで」は精算済み

  // 期間開始: 精算済みならその期末、なければ最初の残高記録の月末
  // (最初の残高は元手=期首残高として扱い、投資収益に誤カウントしない)
  let startDate = periodStart;
  if(!startDate){
    let earliest = null;
    for(const acc of accounts){
      const bs = balancesByAccount[acc.id]||[];
      for(const b of bs){
        if(!earliest || b.year_month < earliest) earliest = b.year_month;
      }
    }
    if(!earliest) return null; // 残高データなし
    startDate = monthEndDate(earliest);
  }

  const today = new Date().toISOString().slice(0,10);

  let profit = 0;
  let hasData = false;
  for(const acc of accounts){
    const bs = balancesByAccount[acc.id]||[];
    const cfs = cashflowsByAccount[acc.id]||[];
    const within = bs.filter(b=>{
      const me = monthEndDate(b.year_month);
      return me > startDate && me <= today;
    });
    if(within.length) hasData = true;
    profit += accountProfitForPeriodGeneric(bs, cfs, startDate, today);
  }
  if(!hasData) return null;

  // 経過月数(開始月の翌月から現在の月まで)
  const sy = Number(startDate.slice(0,4)), sm = Number(startDate.slice(5,7));
  const now = new Date();
  const months = Math.max(1, (now.getUTCFullYear()-sy)*12 + (now.getUTCMonth()+1-sm));
  const salaryCost = Number(monthlySalary||0) * months;

  const distributable = profit - salaryCost;
  const employeeAmount = distributable >= 0 ? distributable * splitRate : distributable;  // マイナスは全額社員負担

  return { startDate, months, profit, salaryCost, distributable, employeeAmount };
}

// accountProfitForPeriodの汎用版(state非依存で、任意のデータを渡せる)
function accountProfitForPeriodGeneric(balances, cashflows, startDate, endDate){
  const sorted = (balances||[]).slice().sort((a,b)=> a.year_month.localeCompare(b.year_month));
  const before = sorted.filter(b=>monthEndDate(b.year_month) <= startDate);
  const within = sorted.filter(b=>{
    const me = monthEndDate(b.year_month);
    return me > startDate && me <= endDate;
  });
  const startBalance = before.length ? Number(before[before.length-1].balance) : 0;
  const endBalance = within.length ? Number(within[within.length-1].balance) : startBalance;
  const cfs = (cashflows||[]).filter(cf => cf.flow_date > startDate && cf.flow_date <= endDate);
  const netCashflow = cfs.reduce((s,cf)=>s+Number(cf.amount), 0);
  return (endBalance - startBalance) - netCashflow;
}

async function addBalance(accountId, yearMonthValue, amount){
  const { error } = await sb.from('monthly_balances').insert({
    account_id: accountId,
    year_month: yearMonthValue + '-01',

async function downloadBackup(){
  const tables = [
    'companies','employees','trading_accounts','monthly_balances',
    'expenses','account_cashflows','incentive_ledger','annual_settlements',
    'company_pl_summary','loss_carryforward_vintages'
  ];
  const backup = { exported_at: new Date().toISOString() };
  for(const t of tables){
    const { data, error } = await sb.from(t).select('*');
    if(error){ alert(`バックアップに失敗しました(${t}): ${error.message}`); return; }
    backup[t] = data || [];
  }
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `salt-group-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

  // 現在の並び順を 0,1,2... に正規化しつつ、対象の2件だけ入れ替える
  const orders = list.map((c,i)=>i);
  const tmp = orders[idx]; orders[idx] = orders[swapIdx]; orders[swapIdx] = tmp;

  for(let i=0;i<list.length;i++){
    await sb.from('companies').update({ display_order: orders[i] }).eq('id', list[i].id);
  }

/* ---------------------------------------------------------------------
   投資収益の計算（残高の増減 − 入出金）
   注意: 月次残高は「その月の1日」として保存されているが、意味としては
   「その月末時点の残高」を表す。比較の基準もすべて月末日にそろえることで、
   月の途中に発生した入出金が翌月分として誤集計されるのを防ぐ。
--------------------------------------------------------------------- */
function monthEndDate(yearMonthStr){
  const year = Number(yearMonthStr.slice(0,4));
  const month = Number(yearMonthStr.slice(5,7)); // 1-12
  const last = new Date(Date.UTC(year, month, 0)); // 翌月の0日目 = 当月末日
  return last.toISOString().slice(0,10);
}

function accountProfitForPeriod(accountId, startDate, endDate){
  return accountProfitForPeriodGeneric(
    state.adminBalances[accountId]||[],
    state.adminCashflows[accountId]||[],
    startDate, endDate
  );
}

function employeeInvestmentProfit(employeeId, startDate, endDate){
  const accounts = (state.adminAccounts||[]).filter(a=>a.employee_id===employeeId);
  return accounts.reduce((s,acc)=> s + accountProfitForPeriod(acc.id, startDate, endDate), 0);
}

/* ---------------------------------------------------------------------
   口座管理タブ用: 残高記録の間隔ごとに「その間の入出金」「投資収益」を算出
--------------------------------------------------------------------- */
function monthlySeriesForAccount(accountId, balancesMap, cashflowsMap){
  balancesMap = balancesMap || state.adminBalances || {};
  cashflowsMap = cashflowsMap || state.adminCashflows || {};
  const balances = (balancesMap[accountId]||[]).slice().sort((a,b)=>a.year_month.localeCompare(b.year_month));
  const cashflows = (cashflowsMap[accountId]||[]).slice().sort((a,b)=>a.flow_date.localeCompare(b.flow_date));
  const series = [];
  let prevBalance = null;
  let prevBoundary = null;
  balances.forEach(b => {
    const boundary = monthEndDate(b.year_month);
    const cfSum = cashflows
      .filter(cf => (!prevBoundary || cf.flow_date > prevBoundary) && cf.flow_date <= boundary)
      .reduce((s,cf)=>s+Number(cf.amount), 0);
    const profit = prevBalance===null ? null : (Number(b.balance) - prevBalance) - cfSum;
    series.push({ id: b.id, year_month: b.year_month, balance: Number(b.balance), cashflow: cfSum, profit });
    prevBalance = Number(b.balance);
    prevBoundary = boundary;
  });
  return series;
}

async function saveAnnualSettlement(fields){
  const { data:{ user } } = await sb.auth.getUser();

  const investmentProfit = fields.investmentProfit;
  const salaryCost = fields.salaryCost;
  const taxActive = fields.taxActive;
  const taxRate = fields.taxRate;
  const taxCost = (taxActive && investmentProfit > 0) ? investmentProfit * taxRate : 0;
  const distributable = investmentProfit - salaryCost - taxCost;
  const splitRate = fields.splitRate;
  const employeeAmount = distributable >= 0 ? distributable * splitRate : distributable;  // マイナスは全額社員負担
  const companyShare = distributable >= 0 ? (distributable - employeeAmount) : 0;

  const { data: settlement, error } = await sb.from('annual_settlements').upsert({
    employee_id: fields.employeeId,
    company_id: state.adminCompanyId,
    fiscal_year_start: fields.start,
    fiscal_year_end: fields.end,
    investment_profit: investmentProfit,
    salary_cost: salaryCost,
    company_tax_active: taxActive,
    tax_rate_used: taxActive ? taxRate : 0,
    tax_cost: taxCost,
    distributable,
    split_rate: splitRate,
    employee_settlement_amount: employeeAmount,
    company_share: companyShare,
    created_by: user.id
  }, { onConflict: 'employee_id,fiscal_year_end' }).select().single();

  if(error){ alert('精算の保存に失敗しました: '+error.message); return; }

  await sb.from('incentive_ledger').insert({
    employee_id: fields.employeeId,
    entry_type: 'annual_settlement',
    amount: employeeAmount,
    status: 'completed',
    related_settlement_id: settlement.id,
    note: `${fields.start} 〜 ${fields.end} の年次精算`
  });

  loadAdminData();
}

/* 年次集計: monthlySeriesを会社の期首月で年度グルーピング */
function yearlySeriesForAccount(accountId, balancesMap, cashflowsMap, fsmOverride){
  const company = state.companies.find(c=>c.id===state.adminCompanyId);
  const fsm = fsmOverride || company?.fiscal_year_start_month || 4;
  const monthly = monthlySeriesForAccount(accountId, balancesMap, cashflowsMap);
  const groups = {};
  monthly.forEach(s => {
    const y = Number(s.year_month.slice(0,4));
    const m = Number(s.year_month.slice(5,7));
    const fiscalStartYear = m >= fsm ? y : y - 1;
    if(!groups[fiscalStartYear]) groups[fiscalStartYear] = { items: [] };
    groups[fiscalStartYear].items.push(s);
  });
  return Object.keys(groups).sort().map(fy => {
    const items = groups[fy].items;
    const last = items[items.length-1];
    const cashflow = items.reduce((s,i)=>s+i.cashflow,0);
    const profit = items.reduce((s,i)=> i.profit==null ? s : s+i.profit, 0);
    const endMonth = fsm === 1 ? 12 : fsm - 1;
    const endYear = fsm === 1 ? Number(fy) : Number(fy)+1;
    return {
      label: `${fy}/${fsm}〜${endYear}/${endMonth}期`,
      balance: last.balance,   // 年度末(最新)残高
      cashflow, profit
    };
  });
}

function chartSeries(ctx){
  // ctx未指定 = 管理者画面 / ctx指定 = 社員画面
  const accountId = ctx ? ctx.accountId : state.selectedChartAccountId;
  const balancesMap = ctx ? ctx.balancesMap : undefined;
  const cashflowsMap = ctx ? ctx.cashflowsMap : undefined;
  const fsm = ctx ? ctx.fsm : undefined;
  const period = (ctx ? ctx.period : state.chartPeriod) || 'monthly';
  if(period === 'yearly'){
    return yearlySeriesForAccount(accountId, balancesMap, cashflowsMap, fsm).map(s=>({ ...s }));
  }
  return monthlySeriesForAccount(accountId, balancesMap, cashflowsMap).map(s=>({ ...s, label: ym(s.year_month) }));
}

/* 金額の軸ラベルを「万」単位で短縮 */
function yenShort(v){
  const n = Number(v);
  if(Math.abs(n) >= 100000000) return (n/100000000).toLocaleString('ja-JP', {maximumFractionDigits:1}) + '億';
  if(Math.abs(n) >= 10000) return (n/10000).toLocaleString('ja-JP', {maximumFractionDigits:0}) + '万';
  return n.toLocaleString('ja-JP');
}

function drawAccountCharts(ctx){
  if(!window.Chart) return;
  const series = chartSeries(ctx);
  const labels = series.map(s=>s.label);
  const isMobile = window.innerWidth <= 640;
  const prefix = (ctx && ctx.keyPrefix) || 'admin';
  const balanceCanvasId = (ctx && ctx.balanceCanvasId) || 'balance-chart';
  const profitCanvasId = (ctx && ctx.profitCanvasId) || 'profit-chart';

  state.charts = state.charts || {};
  const bKey = prefix + '-balance', pKey = prefix + '-profit';
  if(state.charts[bKey]){ state.charts[bKey].destroy(); state.charts[bKey] = null; }
  if(state.charts[pKey]){ state.charts[pKey].destroy(); state.charts[pKey] = null; }

  const commonTicks = {
    font: { size: isMobile ? 10 : 12 },
  };
  const xTicks = {
    ...commonTicks,
    autoSkip: true,
    maxTicksLimit: isMobile ? 6 : 12,
    maxRotation: isMobile ? 45 : 0,
  };

  const balanceCanvas = document.getElementById(balanceCanvasId);
  if(balanceCanvas){
    state.charts[bKey] = new Chart(balanceCanvas, {
      data: {
        labels,
        datasets: [
          {
            type:'bar', label:'入出金', data: series.map(s=>s.cashflow),
            backgroundColor: series.map(s=> s.cashflow<0 ? 'rgba(180,83,61,0.6)' : 'rgba(63,143,95,0.6)'),
            yAxisID:'y1', order:2
          },
          {
            type:'line', label:'残高', data: series.map(s=>s.balance),
            borderColor:'#1C2B39', backgroundColor:'#1C2B39',
            pointRadius: isMobile ? 2.5 : 3, borderWidth: isMobile ? 2 : 3, tension:0.25,
            yAxisID:'y', order:1
          }
        ]
      },
      options: {
        responsive:true,
        maintainAspectRatio:false,
        interaction:{ mode:'index', intersect:false },
        scales: {
          x: { ticks: xTicks, grid:{ display:false } },
          y: { position:'left', ticks:{ ...commonTicks, callback:yenShort, maxTicksLimit: isMobile ? 5 : 8 } },
          y1:{ position:'right', grid:{ drawOnChartArea:false }, ticks:{ ...commonTicks, callback:yenShort, maxTicksLimit: isMobile ? 4 : 6 } }
        },
        plugins: {
          legend:{ position:'bottom', labels:{ font:{ size: isMobile ? 11 : 12 }, boxWidth: 14 } },
          tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${yen(ctx.raw)}` } }

async function addAnnualExpense(){
  const employeeId = document.getElementById('ae-emp').value;
  const fiscalYearEnd = document.getElementById('ae-year').value;
  const amount = Number(document.getElementById('ae-amount').value);
  const fundedBy = document.getElementById('ae-funded').value;
  const note = document.getElementById('ae-note').value || null;
  if(!employeeId || !fiscalYearEnd || !amount){ alert('社員・年度・金額を入力してください'); return; }

  if(fundedBy === 'incentive'){
    const available = incentiveAvailable(employeeIncentiveLedger(employeeId));
    if(amount > available && !confirm(`インセンティブ残高(利用可能: ${yen(available)})を超えていますが、登録しますか？(残高がマイナスになります)`)) return;
  }

  const { data:{ user } } = await sb.auth.getUser();

  let ledgerEntryId = null;
  if(fundedBy === 'incentive'){
    const { data: le, error: lerr } = await sb.from('incentive_ledger').insert({
      employee_id: employeeId, entry_type: 'expense_payment',
      amount: -Math.abs(amount), status: 'completed',
      note: `〜${fiscalYearEnd} 年度経費合計` + (note ? `: ${note}` : ''),
      created_by: user.id
    }).select().single();
    if(lerr){ alert('インセンティブ控除の記録に失敗しました: '+lerr.message); return; }
    ledgerEntryId = le.id;
  }

  const { error } = await sb.from('annual_expenses').insert({
    employee_id: employeeId, fiscal_year_end: fiscalYearEnd,
    amount, funded_by: fundedBy, ledger_entry_id: ledgerEntryId, note, created_by: user.id
  });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}

async function deleteAnnualExpense(id){
  const rec = (state.adminAnnualExpenses||[]).find(e=>e.id===id);
  if(!rec) return;
  if(!confirm('この年度経費の記録を削除します。インセンティブから控除されていた場合、その控除も取り消されます。よろしいですか？')) return;
  if(rec.ledger_entry_id){
    await sb.from('incentive_ledger').delete().eq('id', rec.ledger_entry_id);
  }
  const { error } = await sb.from('annual_expenses').delete().eq('id', id);
  if(error){ alert('削除に失敗しました: '+error.message); return; }
  loadAdminData();
}

/* 会社の期首月から、選択可能な年度リストを生成 */
function fiscalYearOptions(fiscalStartMonth, count){
  count = count || 6;
  const options = [];
  const now = new Date();
  // 現在進行中の年度の期首年を求める
  let startYear = now.getFullYear();
  if(now.getMonth()+1 < fiscalStartMonth) startYear -= 1;
  for(let i=0; i<count; i++){
    const y = startYear - i;
    const start = `${y}-${String(fiscalStartMonth).padStart(2,'0')}-01`;
    const endMonth = fiscalStartMonth === 1 ? 12 : fiscalStartMonth - 1;
    const endYear = fiscalStartMonth === 1 ? y : y + 1;
    const end = monthEndDate(`${endYear}-${String(endMonth).padStart(2,'0')}`);
    const isCurrent = i === 0;
    options.push({ start, end, isCurrent,
      label: `${y}年${fiscalStartMonth}月 〜 ${endYear}年${endMonth}月${isCurrent?'(進行中)':''}` });
  }
  return options;
}

  if(!state.settlementForm || state.settlementForm.companyId !== state.adminCompanyId){
    // 会社を切り替えたら、その会社の「直近の完了した年度」をデフォルト選択
    const defaultYear = years.find(y=>!y.isCurrent) || years[0];
    state.settlementForm = {
      companyId: state.adminCompanyId,
      start: defaultYear.start,
      end: defaultYear.end,
      taxActive: false,
      taxRate: 0.30,
      splitRate: 0.5,

  const yearOptions = years.map(y =>
    `<option value="${y.start}|${y.end}" ${y.start===f.start?'selected':''}>${y.label}</option>`
  ).join('');

  const remainingLoss = (state.adminLoss||[]).reduce((s,l)=>s+Number(l.remaining_amount||0),0);

  const selectedYear = years.find(y=>y.start===f.start);
  const isCurrentYear = selectedYear?.isCurrent;

  const rows = (state.adminEmployees||[]).map(emp => {

    const profit = employeeInvestmentProfit(emp.id, addDaysStr(f.start,-1), f.end);

    const companyShare = distributable >= 0 ? (distributable - employeeAmount) : 0;
    const already = (state.adminSettlements||[]).find(s=>s.employee_id===emp.id && s.fiscal_year_end===f.end);

    return `

      <div class="row" style="margin-top:14px;">

      </div>
      <div style="margin-top:16px;">
        <button class="btn-accent" ${(already||isCurrentYear)?'disabled':''} onclick="saveAnnualSettlement({
          employeeId:'${emp.id}', start:'${f.start}', end:'${f.end}',
          investmentProfit:${profit}, salaryCost:${annualSalary},
          taxActive:${f.taxActive}, taxRate:${f.taxRate}, splitRate:${f.splitRate}
        })">${already?'この年度は記録済みです':(isCurrentYear?'進行中の年度は確定できません':'この内容で確定してインセンティブに反映')}</button>
      </div>
    </div>`;
  }).join('') || `<div class="card"><p class="empty">社員が登録されていません</p></div>`;

  return `
  <div class="card">
    <h2>年次精算</h2>
    <div class="desc">この会社の決算期: 毎年${fiscalStartMonth}月開始。現在の繰越欠損金残高合計: <strong>${yen(remainingLoss)}</strong>${remainingLoss<=0?' — 使い切っているため通常は法人税が発生します':' — 残っているため通常は法人税は発生しません'}</div>

/* 日付文字列に日数を加算 */
function addDaysStr(dateStr, days){
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}

  return `
  <div class="card">
    <div class="stat"><div class="label">現在の繰越欠損金残高合計</div><div class="value" style="font-size:28px">${yen(total)}</div></div>
  </div>
  <div class="card">
    <h2>発生年度別の内訳</h2>
    <table>
      <thead><tr><th>発生事業年度</th><th class="num">発生額</th><th class="num">控除済み累計</th><th class="num">繰越残額</th><th>失効期限</th><th>出典</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="card">
    <h2>欠損金データを追加</h2>
    <div class="desc">決算書(別表七)の内容を年度ごとに転記してください。失効期限の目安は発生事業年度の期末+10年です。</div>
    <div class="row">
      <div><label>発生事業年度・期首</label><input type="date" id="loss-start" /></div>
      <div><label>発生事業年度・期末</label><input type="date" id="loss-end" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>発生額</label><input type="number" id="loss-incurred" /></div>
      <div><label>控除済み累計</label><input type="number" id="loss-used" value="0" /></div>
      <div><label>繰越残額</label><input type="number" id="loss-remaining" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>失効期限</label><input type="date" id="loss-expiry" /></div>
      <div><label>出典メモ</label><input type="text" id="loss-doc" placeholder="例: 第12期 別表七(一)" /></div>
    </div>
    <div style="margin-top:14px;">
      <button class="btn-accent" onclick="submitLossForm()">保存</button>
    </div>
  </div>`;
}

function submitLossForm(){
  addLoss({
    start: document.getElementById('loss-start').value,
    end: document.getElementById('loss-end').value,
    incurred: Number(document.getElementById('loss-incurred').value)||0,
    used: Number(document.getElementById('loss-used').value)||0,
    remaining: Number(document.getElementById('loss-remaining').value)||0,
    expiry: document.getElementById('loss-expiry').value || null,
    doc: document.getElementById('loss-doc').value,
  });
}

/* =====================================================================
   起動
===================================================================== */
boot();
</script>
</body>
</html>
