<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salt Group | 口座・経費・決算管理</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
  :root{
    --ink:#1C2B39;
    --bg:#F7F5F1;
    --card:#FFFFFF;
    --accent:#2F7A6B;
    --accent-soft:#E4EFEC;
    --positive:#3F8F5F;
    --positive-soft:#E7F3EC;
    --negative:#B4533D;
    --negative-soft:#F7EAE5;
    --warn:#B98A2E;
    --warn-soft:#F6EFDF;
    --muted:#7C8A93;
    --border:#E2DED4;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3{
    font-family:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;
    margin:0 0 4px 0;
    letter-spacing:.01em;
  }
  .num{
    font-family:'JetBrains Mono',monospace;
    font-variant-numeric:tabular-nums;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:11px 18px;
    font-size:14px;
    font-weight:600;
    transition:transform .08s ease, opacity .15s ease;
  }
  button:active{transform:scale(0.98);}
  button:focus-visible, input:focus-visible, select:focus-visible{
    outline:3px solid var(--accent-soft);
    outline-offset:1px;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:.88;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:hover{opacity:.88;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}
  .btn-ghost:hover{background:#fff;}
  .btn-approve{background:var(--positive);color:#fff;padding:7px 14px;font-size:13px;}
  .btn-reject{background:transparent;color:var(--negative);border:1px solid var(--negative);padding:7px 14px;font-size:13px;}
  input,select,textarea{
    font-family:inherit;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  label{font-size:12.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px;}

  .wave{width:100%;height:20px;display:block;opacity:.55;margin:28px 0;}

  /* --- ゲート画面 --- */
  .gate-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .gate-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px 32px;
    max-width:420px;
    width:100%;
    box-shadow:0 1px 2px rgba(28,43,57,.04);
  }
  .gate-eyebrow{
    font-size:12px;letter-spacing:.12em;color:var(--accent);font-weight:700;
    text-transform:uppercase;margin-bottom:10px;
  }
  .gate-title{font-size:24px;font-weight:700;margin-bottom:6px;}
  .gate-sub{font-size:13.5px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
  .role-buttons{display:flex;flex-direction:column;gap:10px;}
  .role-buttons button{padding:16px;font-size:15px;text-align:left;display:flex;justify-content:space-between;align-items:center;}
  .role-buttons button span.sub{display:block;font-weight:400;font-size:12px;margin-top:3px;opacity:.75;}

  .field-group{margin-bottom:16px;}
  .error-msg{color:var(--negative);font-size:13px;margin-top:10px;min-height:18px;}
  .back-link{font-size:13px;color:var(--muted);cursor:pointer;display:inline-block;margin-bottom:18px;}
  .back-link:hover{color:var(--ink);}

  /* --- ダッシュボード共通 --- */
  .topbar{
    background:var(--ink);color:#fff;
    padding:16px 24px;display:flex;justify-content:space-between;align-items:center;
    flex-wrap:wrap;gap:10px;
  }
  .topbar .brand{font-family:'Zen Kaku Gothic New';font-weight:700;font-size:16px;}
  .topbar .who{font-size:12.5px;opacity:.75;margin-top:2px;}
  .topbar button{background:rgba(255,255,255,.12);color:#fff;font-size:12.5px;padding:8px 14px;}
  .topbar button:hover{background:rgba(255,255,255,.22);}

  .container{max-width:1040px;margin:0 auto;padding:28px 20px 60px;}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:22px 24px;margin-bottom:20px;
  }
  .card h2{font-size:16px;}
  .card .desc{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:180px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;}
  td.num, th.num{text-align:right;}
  tr:last-child td{border-bottom:none;}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .badge-pending{background:var(--warn-soft);color:var(--warn);}
  .badge-approved{background:var(--positive-soft);color:var(--positive);}
  .badge-rejected{background:var(--negative-soft);color:var(--negative);}

  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat .label{font-size:12px;color:var(--muted);}
  .stat .value{font-size:22px;font-weight:600;font-family:'JetBrains Mono';}
  .stat .value.negative{color:var(--negative);}
  .stat .value.positive{color:var(--positive);}

  .tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .tabs button{background:transparent;color:var(--muted);padding:9px 16px;border:1px solid transparent;font-size:13.5px;}
  .tabs button.active{background:var(--card);color:var(--ink);border-color:var(--border);}

  .form-inline{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:14px;}
  .form-inline > div{flex:1;min-width:140px;}
  .form-inline button{white-space:nowrap;}

  .empty{color:var(--muted);font-size:13px;padding:14px 0;}
  .muted{color:var(--muted);}
  .company-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .company-picker button{padding:8px 14px;font-size:13px;background:#fff;border:1px solid var(--border);color:var(--ink);}
  .company-picker button.active{background:var(--ink);color:#fff;}

  .loss-expiry-warn{color:var(--warn);font-weight:700;}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* =====================================================================
   Supabase 初期化
===================================================================== */
if(!window.SUPABASE_URL || window.SUPABASE_URL.includes("xxxx")){
  document.getElementById('app').innerHTML =
    '<div style="padding:40px;font-family:sans-serif;max-width:560px;margin:0 auto;">' +
    '<h2>config.js が未設定です</h2>' +
    '<p>config.example.js を config.js としてコピーし、SupabaseプロジェクトのURLとanon keyを設定してください。</p>' +
    '</div>';
  throw new Error("config.js not set");
}
const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

/* =====================================================================
   グローバル状態
===================================================================== */
const state = {
  screen: 'loading',        // loading | gate | emp-pick | emp-pin | admin-pin | employee | admin
  companies: [],
  employees: [],
  selectedCompanyId: null,
  selectedEmployeeId: null,
  session: null,             // { role: 'employee'|'admin', employeeId }
  currentEmployee: null,     // 自分の社員情報(employeeログイン時)
  adminCompanyId: null,      // 管理者が見ている会社
  adminTab: 'accounts',
};

const app = document.getElementById('app');
const yen = n => (n===null||n===undefined) ? '—' : Number(n).toLocaleString('ja-JP') + '円';
const ym = d => { const dt=new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月`; };

function waveDivider(){
  return `<svg class="wave" viewBox="0 0 400 20" preserveAspectRatio="none">
    <path d="M0 10 Q 25 0, 50 10 T 100 10 T 150 10 T 200 10 T 250 10 T 300 10 T 350 10 T 400 10"
      fill="none" stroke="#2F7A6B" stroke-width="1.5"/>
  </svg>`;
}

/* =====================================================================
   認証（匿名サインイン）
===================================================================== */
async function ensureAnonSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) return session;
  const { data, error } = await sb.auth.signInAnonymously();
  if(error){
    console.error(error);
    alert("匿名サインインに失敗しました。Supabase の Authentication → Providers → Anonymous Sign-Ins が有効か確認してください。");
    throw error;
  }
  return data.session;
}

async function loadExistingAppSession(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return null;
  const { data, error } = await sb.from('app_sessions').select('*').eq('id', user.id).maybeSingle();
  if(error || !data) return null;
  return { role: data.role, employeeId: data.employee_id };
}

/* =====================================================================
   起動
===================================================================== */
async function boot(){
  await ensureAnonSession();
  const existing = await loadExistingAppSession();
  if(existing){
    state.session = existing;
    if(existing.role === 'admin'){
      await enterAdmin();
    } else {
      await enterEmployee(existing.employeeId);
    }
  } else {
    state.screen = 'gate';
    render();
  }
}

/* =====================================================================
   画面遷移: ゲート
===================================================================== */
function goGate(){ state.screen='gate'; render(); }

async function goEmployeePick(){
  const { data, error } = await sb.from('company_directory').select('*').order('name');
  state.companies = data || [];
  state.screen = 'emp-company';
  render();
}

async function selectCompanyForEmployee(companyId){
  state.selectedCompanyId = companyId;
  const { data } = await sb.from('employee_directory').select('*').eq('company_id', companyId).order('name');
  state.employees = data || [];
  state.screen = 'emp-name';
  render();
}

function selectEmployeeName(employeeId){
  state.selectedEmployeeId = employeeId;
  state.screen = 'emp-pin';
  render();
}

function goAdminPin(){ state.screen='admin-pin'; render(); }

/* =====================================================================
   PIN照合
===================================================================== */
async function submitEmployeePin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_employee_pin', { pin, target_employee_id: state.selectedEmployeeId });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterEmployee(state.selectedEmployeeId);
}

async function submitAdminPin(pin){
  const errEl = document.getElementById('pin-error');
  const { data, error } = await sb.rpc('verify_admin_pin', { pin });
  if(error || !data){
    if(errEl) errEl.textContent = 'PINが違います。もう一度お試しください。';
    return;
  }
  await enterAdmin();
}

async function logout(){
  await sb.auth.signOut();
  Object.assign(state, {
    screen:'gate', session:null, currentEmployee:null,
    selectedCompanyId:null, selectedEmployeeId:null, adminCompanyId:null
  });
  await ensureAnonSession();
  render();
}

/* =====================================================================
   社員ダッシュボード
===================================================================== */
async function enterEmployee(employeeId){
  const { data: emp } = await sb.from('employees').select('*').eq('id', employeeId).maybeSingle();
  // 上のクエリは admin 以外は RLS で弾かれる想定なので、employee_directory からも補完
  let empInfo = emp;
  if(!empInfo){
    const { data: dir } = await sb.from('employee_directory').select('*').eq('id', employeeId).maybeSingle();
    empInfo = dir;
  }
  state.currentEmployee = empInfo;
  state.session = { role:'employee', employeeId };
  state.screen = 'employee';
  render();
  loadEmployeeData();
}

async function loadEmployeeData(){
  const employeeId = state.session.employeeId;
  const { data: accounts } = await sb.from('trading_accounts').select('*').eq('employee_id', employeeId);
  state.myAccounts = accounts || [];

  state.myBalances = {};
  for(const acc of state.myAccounts){
    const { data: balances } = await sb.from('monthly_balances').select('*').eq('account_id', acc.id).order('year_month', {ascending:false});
    state.myBalances[acc.id] = balances || [];
  }

  const { data: expenses } = await sb.from('expenses').select('*').eq('employee_id', employeeId).order('created_at', {ascending:false});
  state.myExpenses = expenses || [];

  renderEmployeeDashboard();
}

async function addBalance(accountId, yearMonthValue, amount){
  const { error } = await sb.from('monthly_balances').insert({
    account_id: accountId,
    year_month: yearMonthValue + '-01',
    balance: amount
  });
  if(error){ alert('登録に失敗しました: ' + error.message); return; }
  loadEmployeeData();
}

async function addExpense(date, amount, description){
  const { error } = await sb.from('expenses').insert({
    employee_id: state.session.employeeId,
    expense_date: date,
    amount: amount,
    description: description
  });
  if(error){ alert('申請に失敗しました: ' + error.message); return; }
  loadEmployeeData();
}

/* =====================================================================
   管理者ダッシュボード
===================================================================== */
async function enterAdmin(){
  state.session = { role:'admin' };
  state.screen = 'admin';
  const { data: companies } = await sb.from('companies').select('*').order('name');
  state.companies = companies || [];
  if(companies && companies.length){ state.adminCompanyId = companies[0].id; }
  render();
  loadAdminData();
}

async function loadAdminData(){
  if(!state.adminCompanyId){ renderAdminDashboard(); return; }
  const companyId = state.adminCompanyId;

  const { data: employees } = await sb.from('employees').select('*').eq('company_id', companyId).order('name');
  state.adminEmployees = employees || [];

  const { data: accounts } = await sb.from('trading_accounts').select('*').eq('company_id', companyId);
  state.adminAccounts = accounts || [];

  state.adminBalances = {};
  for(const acc of state.adminAccounts){
    const { data: balances } = await sb.from('monthly_balances').select('*').eq('account_id', acc.id).order('year_month', {ascending:false});
    state.adminBalances[acc.id] = balances || [];
  }

  const empIds = (employees||[]).map(e=>e.id);
  let expenses = [];
  if(empIds.length){
    const { data } = await sb.from('expenses').select('*').in('employee_id', empIds).order('created_at', {ascending:false});
    expenses = data || [];
  }
  state.adminExpenses = expenses;

  const { data: pl } = await sb.from('company_pl_summary').select('*').eq('company_id', companyId).order('fiscal_year_end', {ascending:false});
  state.adminPL = pl || [];

  const { data: loss } = await sb.from('loss_carryforward_vintages').select('*').eq('company_id', companyId).order('fiscal_year_end', {ascending:false});
  state.adminLoss = loss || [];

  renderAdminDashboard();
}

function switchAdminCompany(id){
  state.adminCompanyId = id;
  loadAdminData();
}

function switchAdminTab(tab){
  state.adminTab = tab;
  renderAdminDashboard();
}

async function approveExpense(id){
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('expenses').update({ status:'approved', approved_by:user.id, approved_at:new Date().toISOString() }).eq('id', id);
  if(error){ alert('更新に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function rejectExpense(id){
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('expenses').update({ status:'rejected', approved_by:user.id, approved_at:new Date().toISOString() }).eq('id', id);
  if(error){ alert('更新に失敗しました: '+error.message); return; }
  loadAdminData();
}

async function addEmployee(name, salary){
  const { error } = await sb.from('employees').insert({ company_id: state.adminCompanyId, name, monthly_salary: salary });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function addAccount(name, employeeId){
  const { error } = await sb.from('trading_accounts').insert({ company_id: state.adminCompanyId, account_name:name, employee_id: employeeId || null });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function addCompany(name){
  const { error } = await sb.from('companies').insert({ name });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  const { data: companies } = await sb.from('companies').select('*').order('name');
  state.companies = companies || [];
  render();
}
async function addPL(fields){
  const { error } = await sb.from('company_pl_summary').upsert({
    company_id: state.adminCompanyId,
    fiscal_year_start: fields.start, fiscal_year_end: fields.end,
    revenue: fields.revenue, sga_cost: fields.sga, operating_profit: fields.op,
    pretax_profit: fields.pretax, tax_amount: fields.tax, net_profit: fields.net,
    assumed_tax_rate: fields.rate, notes: fields.notes
  }, { onConflict:'company_id,fiscal_year_end' });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}
async function addLoss(fields){
  const { error } = await sb.from('loss_carryforward_vintages').insert({
    company_id: state.adminCompanyId,
    fiscal_year_start: fields.start, fiscal_year_end: fields.end,
    incurred_amount: fields.incurred, used_amount: fields.used,
    remaining_amount: fields.remaining, expiry_fiscal_year_end: fields.expiry,
    source_document: fields.doc
  });
  if(error){ alert('登録に失敗しました: '+error.message); return; }
  loadAdminData();
}

/* =====================================================================
   レンダリング: ゲート系
===================================================================== */
function render(){
  if(state.screen==='loading'){ app.innerHTML = '<div class="gate-wrap"><p class="muted">読み込み中…</p></div>'; return; }
  if(state.screen==='gate') return renderGate();
  if(state.screen==='emp-company') return renderEmpCompanyPick();
  if(state.screen==='emp-name') return renderEmpNamePick();
  if(state.screen==='emp-pin') return renderPinScreen('employee');
  if(state.screen==='admin-pin') return renderPinScreen('admin');
  if(state.screen==='employee') return renderEmployeeDashboard();
  if(state.screen==='admin') return renderAdminDashboard();
}

function renderGate(){
  app.innerHTML = `
  <div class="gate-wrap">
    <div class="gate-card">
      <div class="gate-eyebrow">Salt Group</div>
      <div class="gate-title">口座・経費・決算管理</div>
      <div class="gate-sub">あなたの役割を選んでください。社員は自分の口座残高の入力と経費申請、管理者は全社の残高・経費承認・決算情報の確認ができます。</div>
      <div class="role-buttons">
        <button class="btn-primary" onclick="goEmployeePick()">社員としてログイン<span class="sub">口座残高の入力・経費申請</span></button>
        <button class="btn-ghost" onclick="goAdminPin()">管理者としてログイン<span class="sub">全社確認・経費承認・決算情報</span></button>
      </div>
    </div>
  </div>`;
}

function renderEmpCompanyPick(){
  const items = state.companies.map(c =>
    `<button class="btn-ghost" style="text-align:left;padding:14px 16px;margin-bottom:8px;width:100%" onclick="selectCompanyForEmployee('${c.id}')">${c.name}</button>`
  ).join('') || '<p class="empty">会社が登録されていません。先に管理者が会社を登録してください。</p>';
  app.innerHTML = `
  <div class="gate-wrap">
    <div class="gate-card">
      <div class="back-link" onclick="goGate()">← 戻る</div>
      <div class="gate-title">会社を選択</div>
      <div class="gate-sub">所属している会社を選んでください。</div>
      ${items}
    </div>
  </div>`;
}

function renderEmpNamePick(){
  const items = state.employees.map(e =>
    `<button class="btn-ghost" style="text-align:left;padding:14px 16px;margin-bottom:8px;width:100%" onclick="selectEmployeeName('${e.id}')">${e.name}</button>`
  ).join('') || '<p class="empty">この会社には社員が登録されていません。</p>';
  app.innerHTML = `
  <div class="gate-wrap">
    <div class="gate-card">
      <div class="back-link" onclick="goEmployeePick()">← 戻る</div>
      <div class="gate-title">あなたの名前を選択</div>
      <div class="gate-sub">リストにない場合は管理者に社員登録を依頼してください。</div>
      ${items}
    </div>
  </div>`;
}

function renderPinScreen(kind){
  const title = kind === 'employee' ? '社員用PINを入力' : '管理者用PINを入力';
  const back = kind === 'employee' ? `goEmployeePick()` : `goGate()`;
  const submit = kind === 'employee' ? `submitEmployeePin(document.getElementById('pin-input').value)` : `submitAdminPin(document.getElementById('pin-input').value)`;
  app.innerHTML = `
  <div class="gate-wrap">
    <div class="gate-card">
      <div class="back-link" onclick="${back}">← 戻る</div>
      <div class="gate-title">${title}</div>
      <div class="gate-sub">チームで共有しているPINを入力してください。</div>
      <div class="field-group">
        <input id="pin-input" type="password" inputmode="numeric" placeholder="PIN" autofocus
          onkeydown="if(event.key==='Enter'){${submit}}" />
        <div class="error-msg" id="pin-error"></div>
      </div>
      <button class="btn-primary" style="width:100%" onclick="${submit}">ログイン</button>
    </div>
  </div>`;
  setTimeout(()=>document.getElementById('pin-input')?.focus(), 30);
}

/* =====================================================================
   レンダリング: 社員ダッシュボード
===================================================================== */
function renderEmployeeDashboard(){
  const empName = state.currentEmployee?.name || '';
  const accounts = state.myAccounts || [];
  const expenses = state.myExpenses || [];

  const accountsHtml = accounts.map(acc => {
    const balances = state.myBalances[acc.id] || [];
    const rows = balances.map(b => `<tr><td>${ym(b.year_month)}</td><td class="num">${yen(b.balance)}</td></tr>`).join('')
      || `<tr><td colspan="2" class="empty">まだ入力がありません</td></tr>`;
    return `
    <div class="card">
      <h2>${acc.account_name}</h2>
      <div class="desc">月末残高の推移</div>
      <table>
        <thead><tr><th>年月</th><th class="num">残高</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="form-inline">
        <div><label>対象月</label><input type="month" id="ym-${acc.id}" /></div>
        <div><label>残高</label><input type="number" id="bal-${acc.id}" placeholder="例: 1500000" /></div>
        <button class="btn-accent" onclick="addBalance('${acc.id}', document.getElementById('ym-${acc.id}').value, Number(document.getElementById('bal-${acc.id}').value))">登録</button>
      </div>
    </div>`;
  }).join('') || `<div class="card"><p class="empty">担当口座がまだ登録されていません。管理者に依頼してください。</p></div>`;

  const expenseRows = expenses.map(e => {
    const badge = e.status==='approved' ? '<span class="badge badge-approved">承認済み</span>'
      : e.status==='rejected' ? '<span class="badge badge-rejected">却下</span>'
      : '<span class="badge badge-pending">申請中</span>';
    return `<tr><td>${e.expense_date}</td><td>${e.description||''}</td><td class="num">${yen(e.amount)}</td><td>${badge}</td></tr>`;
  }).join('') || `<tr><td colspan="4" class="empty">経費申請はまだありません</td></tr>`;

  app.innerHTML = `
    <div class="topbar">
      <div><div class="brand">Salt Group</div><div class="who">${empName} さん</div></div>
      <button onclick="logout()">ログアウト</button>
    </div>
    <div class="container">
      ${accountsHtml}
      ${waveDivider()}
      <div class="card">
        <h2>経費申請</h2>
        <div class="desc">承認は経理担当者が行います。承認されると社員コストの集計に反映されます。</div>
        <table>
          <thead><tr><th>日付</th><th>内容</th><th class="num">金額</th><th>状態</th></tr></thead>
          <tbody>${expenseRows}</tbody>
        </table>
        <div class="form-inline">
          <div><label>日付</label><input type="date" id="exp-date" /></div>
          <div><label>内容</label><input type="text" id="exp-desc" placeholder="例: 交通費" /></div>
          <div><label>金額</label><input type="number" id="exp-amount" placeholder="例: 3200" /></div>
          <button class="btn-accent" onclick="addExpense(document.getElementById('exp-date').value, Number(document.getElementById('exp-amount').value), document.getElementById('exp-desc').value)">申請する</button>
        </div>
      </div>
    </div>
  `;
}

/* =====================================================================
   レンダリング: 管理者ダッシュボード
===================================================================== */
function renderAdminDashboard(){
  const companyPicker = state.companies.map(c =>
    `<button class="${c.id===state.adminCompanyId?'active':''}" onclick="switchAdminCompany('${c.id}')">${c.name}</button>`
  ).join('');

  const tabs = [
    ['accounts','口座残高'],
    ['cost','社員コスト'],
    ['expenses','経費承認'],
    ['pl','簡易PL'],
    ['loss','繰越欠損金'],
  ].map(([key,label]) => `<button class="${state.adminTab===key?'active':''}" onclick="switchAdminTab('${key}')">${label}</button>`).join('');

  app.innerHTML = `
    <div class="topbar">
      <div><div class="brand">Salt Group</div><div class="who">管理者モード</div></div>
      <button onclick="logout()">ログアウト</button>
    </div>
    <div class="container">
      <div class="company-picker">
        ${companyPicker}
        <button onclick="promptAddCompany()">＋ 会社を追加</button>
      </div>
      <div class="tabs">${tabs}</div>
      <div id="admin-tab-content"></div>
    </div>
  `;
  renderAdminTabContent();
}

function promptAddCompany(){
  const name = prompt('会社名を入力してください');
  if(name) addCompany(name);
}

function renderAdminTabContent(){
  const el = document.getElementById('admin-tab-content');
  if(!el) return;
  if(state.adminTab==='accounts') el.innerHTML = adminAccountsHtml();
  if(state.adminTab==='cost') el.innerHTML = adminCostHtml();
  if(state.adminTab==='expenses') el.innerHTML = adminExpensesHtml();
  if(state.adminTab==='pl') el.innerHTML = adminPLHtml();
  if(state.adminTab==='loss') el.innerHTML = adminLossHtml();
}

function adminAccountsHtml(){
  const employeesById = Object.fromEntries((state.adminEmployees||[]).map(e=>[e.id,e.name]));
  const rows = (state.adminAccounts||[]).map(acc => {
    const balances = state.adminBalances[acc.id] || [];
    const latest = balances[0];
    return `<tr>
      <td>${acc.account_name}</td>
      <td>${employeesById[acc.employee_id] || '未割当'}</td>
      <td class="num">${latest ? yen(latest.balance) : '—'}</td>
      <td>${latest ? ym(latest.year_month) : '—'}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" class="empty">口座がまだ登録されていません</td></tr>`;

  const empOptions = (state.adminEmployees||[]).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');

  return `
  <div class="card">
    <h2>口座残高一覧</h2>
    <div class="desc">各口座の最新残高です。過去推移は今後、行クリックで展開する形に拡張できます。</div>
    <table>
      <thead><tr><th>口座名</th><th>担当社員</th><th class="num">最新残高</th><th>対象月</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="form-inline">
      <div><label>口座名</label><input type="text" id="new-acc-name" placeholder="例: 山田担当 B口座" /></div>
      <div><label>担当社員</label><select id="new-acc-emp"><option value="">未割当</option>${empOptions}</select></div>
      <button class="btn-accent" onclick="addAccount(document.getElementById('new-acc-name').value, document.getElementById('new-acc-emp').value)">口座を追加</button>
    </div>
  </div>
  <div class="card">
    <h2>社員登録</h2>
    <div class="form-inline">
      <div><label>氏名</label><input type="text" id="new-emp-name" placeholder="例: 佐藤 花子" /></div>
      <div><label>月給</label><input type="number" id="new-emp-salary" placeholder="例: 300000" /></div>
      <button class="btn-accent" onclick="addEmployee(document.getElementById('new-emp-name').value, Number(document.getElementById('new-emp-salary').value)||0)">社員を追加</button>
    </div>
  </div>`;
}

function adminCostHtml(){
  const approvedByEmployee = {};
  (state.adminExpenses||[]).filter(e=>e.status==='approved').forEach(e=>{
    approvedByEmployee[e.employee_id] = (approvedByEmployee[e.employee_id]||0) + Number(e.amount);
  });
  const rows = (state.adminEmployees||[]).map(emp => {
    const expCost = approvedByEmployee[emp.id] || 0;
    const total = Number(emp.monthly_salary) + expCost;
    return `<tr>
      <td>${emp.name}</td>
      <td class="num">${yen(emp.monthly_salary)}</td>
      <td class="num">${yen(expCost)}</td>
      <td class="num"><strong>${yen(total)}</strong></td>
    </tr>`;
  }).join('') || `<tr><td colspan="4" class="empty">社員が登録されていません</td></tr>`;

  return `
  <div class="card">
    <h2>社員コスト(月給 + 承認済み経費)</h2>
    <div class="desc">承認済みの経費のみ集計しています。口座収益からこのコストを差し引いた金額が、その社員の担当口座の実質収益になります。</div>
    <table>
      <thead><tr><th>社員</th><th class="num">月給</th><th class="num">承認済み経費(累計)</th><th class="num">コスト計</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function adminExpensesHtml(){
  const employeesById = Object.fromEntries((state.adminEmployees||[]).map(e=>[e.id,e.name]));
  const rows = (state.adminExpenses||[]).map(e => {
    const badge = e.status==='approved' ? '<span class="badge badge-approved">承認済み</span>'
      : e.status==='rejected' ? '<span class="badge badge-rejected">却下</span>'
      : '<span class="badge badge-pending">申請中</span>';
    const actions = e.status==='pending'
      ? `<button class="btn-approve" onclick="approveExpense('${e.id}')">承認</button> <button class="btn-reject" onclick="rejectExpense('${e.id}')">却下</button>`
      : '';
    return `<tr>
      <td>${employeesById[e.employee_id]||'—'}</td>
      <td>${e.expense_date}</td>
      <td>${e.description||''}</td>
      <td class="num">${yen(e.amount)}</td>
      <td>${badge}</td>
      <td>${actions}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" class="empty">経費申請はまだありません</td></tr>`;

  return `
  <div class="card">
    <h2>経費承認</h2>
    <table>
      <thead><tr><th>社員</th><th>日付</th><th>内容</th><th class="num">金額</th><th>状態</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function adminPLHtml(){
  const rows = (state.adminPL||[]).map(p => {
    const remainingLoss = (state.adminLoss||[]).reduce((s,l)=> s + Number(l.remaining_amount||0), 0);
    const taxIfNoLoss = Math.max(0, Number(p.pretax_profit||0)) * Number(p.assumed_tax_rate||0);
    const estimatedTaxNow = remainingLoss > 0 ? 0 : taxIfNoLoss;
    const netAfterTaxEstimate = Number(p.pretax_profit||0) - estimatedTaxNow;
    return `
    <div class="card">
      <div class="row">
        <div class="stat"><div class="label">対象期間</div><div class="value" style="font-size:15px">${p.fiscal_year_start} 〜 ${p.fiscal_year_end}</div></div>
        <div class="stat"><div class="label">売上高</div><div class="value">${yen(p.revenue)}</div></div>
        <div class="stat"><div class="label">税引前利益</div><div class="value ${p.pretax_profit<0?'negative':'positive'}">${yen(p.pretax_profit)}</div></div>
      </div>
      <div class="row" style="margin-top:14px;">
        <div class="stat"><div class="label">当期の法人税等(実績)</div><div class="value">${yen(p.tax_amount)}</div></div>
        <div class="stat"><div class="label">当期純利益(実績)</div><div class="value">${yen(p.net_profit)}</div></div>
        <div class="stat"><div class="label">繰越欠損金を使い切った場合の想定税引後利益</div><div class="value">${yen(netAfterTaxEstimate)}</div></div>
      </div>
      ${p.notes ? `<div class="desc" style="margin-top:12px;">${p.notes}</div>` : ''}
    </div>`;
  }).join('') || `<div class="card"><p class="empty">この会社の簡易PLはまだ登録されていません。</p></div>`;

  return `
    ${rows}
    <div class="card">
      <h2>年度PLを追加・更新</h2>
      <div class="desc">決算書PDFの数値を転記してください。同じ「期末日」で登録すると上書きされます。</div>
      <div class="row">
        <div><label>期首</label><input type="date" id="pl-start" /></div>
        <div><label>期末</label><input type="date" id="pl-end" /></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div><label>売上高</label><input type="number" id="pl-revenue" /></div>
        <div><label>販管費</label><input type="number" id="pl-sga" /></div>
        <div><label>営業利益</label><input type="number" id="pl-op" /></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div><label>税引前利益</label><input type="number" id="pl-pretax" /></div>
        <div><label>法人税等(実績)</label><input type="number" id="pl-tax" /></div>
        <div><label>当期純利益(実績)</label><input type="number" id="pl-net" /></div>
      </div>
      <div class="row" style="margin-top:10px;">
        <div><label>想定実効税率(欠損金を使い切った後)</label><input type="number" step="0.01" id="pl-rate" value="0.30" /></div>
        <div><label>メモ</label><input type="text" id="pl-notes" placeholder="例: 決算報告書PDFより転記" /></div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-accent" onclick="submitPLForm()">保存</button>
      </div>
    </div>
  `;
}

function submitPLForm(){
  addPL({
    start: document.getElementById('pl-start').value,
    end: document.getElementById('pl-end').value,
    revenue: Number(document.getElementById('pl-revenue').value)||null,
    sga: Number(document.getElementById('pl-sga').value)||null,
    op: Number(document.getElementById('pl-op').value)||null,
    pretax: Number(document.getElementById('pl-pretax').value)||null,
    tax: Number(document.getElementById('pl-tax').value)||null,
    net: Number(document.getElementById('pl-net').value)||null,
    rate: Number(document.getElementById('pl-rate').value)||0.30,
    notes: document.getElementById('pl-notes').value,
  });
}

function adminLossHtml(){
  const today = new Date();
  const rows = (state.adminLoss||[]).map(l => {
    const expiry = l.expiry_fiscal_year_end ? new Date(l.expiry_fiscal_year_end) : null;
    const soon = expiry && ((expiry - today) / (1000*60*60*24*365) < 2);
    return `<tr>
      <td>${l.fiscal_year_start} 〜 ${l.fiscal_year_end}</td>
      <td class="num">${yen(l.incurred_amount)}</td>
      <td class="num">${yen(l.used_amount)}</td>
      <td class="num"><strong>${yen(l.remaining_amount)}</strong></td>
      <td class="${soon?'loss-expiry-warn':''}">${l.expiry_fiscal_year_end || '—'}${soon?' ⚠︎期限間近':''}</td>
      <td class="muted">${l.source_document||''}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="6" class="empty">繰越欠損金データはまだ登録されていません</td></tr>`;

  const total = (state.adminLoss||[]).reduce((s,l)=>s+Number(l.remaining_amount||0),0);

  return `
  <div class="card">
    <div class="stat"><div class="label">現在の繰越欠損金残高合計</div><div class="value" style="font-size:28px">${yen(total)}</div></div>
  </div>
  <div class="card">
    <h2>発生年度別の内訳</h2>
    <table>
      <thead><tr><th>発生事業年度</th><th class="num">発生額</th><th class="num">控除済み累計</th><th class="num">繰越残額</th><th>失効期限</th><th>出典</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <div class="card">
    <h2>欠損金データを追加</h2>
    <div class="desc">決算書(別表七)の内容を年度ごとに転記してください。失効期限の目安は発生事業年度の期末+10年です。</div>
    <div class="row">
      <div><label>発生事業年度・期首</label><input type="date" id="loss-start" /></div>
      <div><label>発生事業年度・期末</label><input type="date" id="loss-end" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>発生額</label><input type="number" id="loss-incurred" /></div>
      <div><label>控除済み累計</label><input type="number" id="loss-used" value="0" /></div>
      <div><label>繰越残額</label><input type="number" id="loss-remaining" /></div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div><label>失効期限</label><input type="date" id="loss-expiry" /></div>
      <div><label>出典メモ</label><input type="text" id="loss-doc" placeholder="例: 第12期 別表七(一)" /></div>
    </div>
    <div style="margin-top:14px;">
      <button class="btn-accent" onclick="submitLossForm()">保存</button>
    </div>
  </div>`;
}

function submitLossForm(){
  addLoss({
    start: document.getElementById('loss-start').value,
    end: document.getElementById('loss-end').value,
    incurred: Number(document.getElementById('loss-incurred').value)||0,
    used: Number(document.getElementById('loss-used').value)||0,
    remaining: Number(document.getElementById('loss-remaining').value)||0,
    expiry: document.getElementById('loss-expiry').value || null,
    doc: document.getElementById('loss-doc').value,
  });
}

/* =====================================================================
   起動
===================================================================== */
boot();
</script>
</body>
</html>
